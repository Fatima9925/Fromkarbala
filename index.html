<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From Karbala To Today</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Noto+Nastaliq+Urdu:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0a0a0a; --card: #151515; --text: #ffffff; --accent: #d90429; --gold: #ffb703; --dim: #888; }
        .light-mode { --bg: #f8f9fa; --card: #ffffff; --text: #1a1a1a; --dim: #555; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; transition: 0.4s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .mode-btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .brand { text-align: center; font-size: 0.8rem; letter-spacing: 4px; color: var(--dim); margin: 20px 0; }
        
        /* Daily Highlight Section */
        #daily-highlight { width: 90%; max-width: 500px; margin: 0 auto 25px; background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid var(--accent); border-radius: 25px; padding: 20px; text-align: center; position: relative; }
        .daily-label { color: var(--accent); font-size: 0.7rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; display: block; }

        /* Copy Button for Daily */
        .copy-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; cursor: pointer; }

        .search-bar { width: 90%; display: block; margin: 10px auto; padding: 15px; border-radius: 12px; border: 1px solid #333; background: var(--card); color: var(--text); box-sizing: border-box; }
        .tabs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .tab-btn { background: transparent; border: 1px solid var(--dim); color: var(--dim); padding: 5px 15px; border-radius: 15px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .list-container { width: 92%; max-width: 600px; margin: auto; padding-bottom: 100px; }
        .item-card { background: var(--card); margin-bottom: 12px; padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        #reader-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 30px; overflow-y: auto; }
        .v-ara { font-family: 'Amiri', serif; font-size: 1.8rem; line-height: 1.8; text-align: center; margin-bottom: 20px; }
        .v-urd { font-family: 'Noto Nastaliq Urdu', serif; font-size: 1.2rem; color: var(--gold); line-height: 2.5; text-align: center; border-top: 1px solid #333; padding-top: 20px; }

        /* Full Polish Admin Panel */
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; padding: 30px; overflow-y: auto; }
        .admin-box { max-width: 500px; margin: auto; }
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        footer { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 0.75rem; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header">
            <span style="font-weight: 600; color: var(--accent);">RAI DAIM</span>
            <button class="mode-btn" onclick="toggleMode()">🌓 Mode</button>
        </div>
        <div class="brand">FROM <span style="color:var(--accent)">KARBALA</span> TO TODAY</div>
        
        <div id="daily-highlight">
            <button class="copy-btn" onclick="copyDaily()">Copy</button>
            <span class="daily-label">آج کی آیت / حدیث</span>
            <div id="d-ara" class="v-ara" style="font-size: 1.5rem;">لوڈنگ...</div>
            <div id="d-urd" class="v-urd" style="font-size: 1rem; border:none; padding:0;">انتظار فرمائیں...</div>
        </div>

        <input type="text" id="search" class="search-bar" placeholder="تلاش کریں (Hadees, Dua...)" oninput="renderList()">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="setTab('All')">All</button>
            <button class="tab-btn" onclick="setTab('Hadees')">Hadees</button>
            <button class="tab-btn" onclick="setTab('Dua')">Dua</button>
            <button class="tab-btn" onclick="setTab('Ziyarat')">Ziyarat</button>
        </div>

        <div id="list" class="list-container"></div>
        <footer id="footer-login">BY ZAIGHAM ABBAS & RAI DAIM</footer>
    </div>

    <div id="reader-view">
        <span onclick="closeReader()" style="font-size:2rem; color:var(--accent); cursor:pointer;">✕</span>
        <h2 id="r-title" style="text-align:center; color:var(--accent); font-family:'Noto Nastaliq Urdu';"></h2>
        <div id="r-ara" class="v-ara"></div>
        <div id="r-urd" class="v-urd"></div>
        <button class="btn" id="wa-btn" style="background:#25d366">WhatsApp Share</button>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <h2 style="color:var(--accent); text-align:center; letter-spacing: 3px;">ADMIN PORTAL</h2>
            <input type="text" id="in-n" placeholder="Title (e.g. Hadees-e-Kisa)">
            <select id="in-cat"><option>Hadees</option><option>Dua</option><option>Ziyarat</option></select>
            <textarea id="in-a" rows="5" placeholder="Arabic Text..."></textarea>
            <textarea id="in-u" rows="5" placeholder="Urdu Translation..."></textarea>
            <button class="btn" onclick="publish(false)">PUBLISH TO LIST</button>
            <button class="btn" style="background:var(--gold); color:black;" onclick="publish(true)">SET AS DAILY HIGHLIGHT</button>
            <button class="btn" style="background:#222;" onclick="location.reload()">BACK TO APP</button>
            
            <div id="admin-list" style="margin-top:40px; border-top: 1px solid #333; padding-top: 20px;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8oEauMFRHg-VoDFUhgka2Q7AbLOtdBPc",
            authDomain: "karbala-2fcca.firebaseapp.com",
            databaseURL: "https://karbala-2fcca-default-rtdb.firebaseio.com",
            projectId: "karbala-2fcca",
            storageBucket: "karbala-2fcca.firebasestorage.app",
            messagingSenderId: "407029541851",
            appId: "1:407029541851:web:146422e6ed193cfbaf15fe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let fullData = [];
        let currentTab = 'All';

        // Load Daily
        db.ref('daily').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('d-ara').innerText = d.a;
                document.getElementById('d-urd').innerText = d.u;
            }
        });

        // Load List
        db.ref('content').on('value', snap => {
            fullData = [];
            snap.forEach(c => { fullData.push({id: c.key, ...c.val()}); });
            fullData.reverse();
            renderList();
        });

        function renderList() {
            const query = document.getElementById('search').value.toLowerCase();
            const listDiv = document.getElementById('list');
            const adminList = document.getElementById('admin-list');
            listDiv.innerHTML = ""; adminList.innerHTML = "";

            fullData.forEach(item => {
                if((currentTab === 'All' || item.cat === currentTab) && (item.n.toLowerCase().includes(query))) {
                    listDiv.innerHTML += `<div class="item-card" onclick="openReader('${item.id}')"><div><small style="color:var(--accent)">${item.cat}</small><h3 style="margin:0">${item.n}</h3></div><span>➔</span></div>`;
                    adminList.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px; background:#111; margin-bottom:10px; border-radius:10px; align-items:center;"><span>${item.n}</span> <button onclick="remove('${item.id}')" style="background:red; color:white; border:none; border-radius:5px; padding:5px 12px;">Delete</button></div>`;
                }
            });
        }

        // Fix Admin Panel Click
        document.getElementById('footer-login').addEventListener('click', () => {
            const pass = prompt("Enter Password:");
            if(pass === "karbala786") {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                renderList();
            } else {
                alert("Incorrect Password!");
            }
        });

        function publish(isDaily) {
            const n=document.getElementById('in-n').value, a=document.getElementById('in-a').value, u=document.getElementById('in-u').value, cat=document.getElementById('in-cat').value;
            if(!a) return alert("Text required!");
            if(isDaily) {
                db.ref('daily').set({a, u}).then(() => alert("Daily Section Updated!"));
            } else {
                db.ref('content').push({n,a,u,cat}).then(() => alert("Added to List!"));
            }
        }

        function remove(id) { if(confirm("Delete this?")) db.ref('content').child(id).remove(); }
        function openReader(id) {
            const item = fullData.find(x => x.id === id);
            document.getElementById('r-title').innerText = item.n;
            document.getElementById('r-ara').innerText = item.a;
            document.getElementById('r-urd').innerText = item.u;
            document.getElementById('wa-btn').onclick = () => { window.location.href = `whatsapp://send?text=${encodeURIComponent(item.n + '\n\n' + item.a + '\n\n' + item.u)}`; };
            document.getElementById('reader-view').style.display = 'block';
        }
        function closeReader() { document.getElementById('reader-view').style.display = 'none'; }
        function toggleMode() { document.body.classList.toggle('light-mode'); }
        function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === t)); renderList(); }
        function copyDaily() {
            const text = document.getElementById('d-ara').innerText + "\n\n" + document.getElementById('d-urd').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Copied to Clipboard!"));
        }
    </script>
</body>
</html>
